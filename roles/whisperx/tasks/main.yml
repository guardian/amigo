---
- name: Create whisperx virtual environment
  command: "python3 -m venv {{ whisperx_venv }}"
  args:
    creates: "{{ whisperx_venv }}/bin/python"

- name: Install whisperx
  pip:
    name: "{{ whisperx_package | default('whisperx') }}"
    virtualenv: "{{ whisperx_venv }}"
    version: "{{ whisperx_version | default(omit) }}"

- name: Symlink whisperx onto the PATH
  file:
    src: "{{ whisperx_venv }}/bin/whisperx"
    dest: /usr/local/bin/whisperx
    state: link
